<!DOCTYPE html>
<html lang="lo">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOJI BUILD — Daily Command</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sarabun:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <!-- Header -->
        <div class="header">
            <div>
                <div class="header-title">TOJI <span>BUILD</span></div>
                <div class="header-sub">DAILY COMMAND CENTER — v1.0</div>
            </div>
            <div class="header-right">
                <div class="today-date" id="todayDate">—</div>
                <div class="weight-badge">55 <span>KG</span></div>
                <div style="font-size:11px; color:var(--dim); font-family:var(--font-mono); margin-top:2px;">Last
                    updated: 8 MAY 2026</div>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="nav-tabs" id="navTabs">
            <button class="nav-tab active" data-tab="tracker">COMMAND CENTER</button>
            <button class="nav-tab" data-tab="programs">WORKOUT LIBRARY</button>
            <button class="nav-tab" data-tab="nutrition">NUTRITION</button>
        </div>

        <!-- Tracker Page -->
        <div id="trackerPage" class="page-view active">
            <!-- Day Selector -->
            <div class="day-selector" id="daySelector">
                <button class="day-btn" data-day="0">ຈັນ</button>
                <button class="day-btn" data-day="1">ອັງຄານ</button>
                <button class="day-btn" data-day="2">ພຸດ</button>
                <button class="day-btn" data-day="3">ພະຫັດ</button>
                <button class="day-btn" data-day="4">ສຸກ</button>
                <button class="day-btn" data-day="5">ເສົາ 🔥</button>
                <button class="day-btn" data-day="6">ອາທິດ ⚡</button>
            </div>

            <!-- Main Grid -->
            <div id="mainContent"></div>
        </div>

        <!-- Programs Page -->
        <div id="programsPage" class="page-view">
            <!-- Content dynamically rendered by script.js -->
        </div>

        <!-- Nutrition Page -->
        <div id="nutritionPage" class="page-view">
            <!-- Content dynamically rendered by script.js -->
        </div>

        <div class="footer">
            <div class="footer-note">DATA STORED LOCALLY — RESETS ON CLEAR</div>
            <button class="reset-btn" id="resetBtn">RESET DAY</button>
        </div>

    </div>

    <!-- Bottom Navigation (Mobile) -->
    <nav class="bottom-nav" id="bottomNav">
        <button class="bottom-nav-item active" data-tab="tracker">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 11l3 3L22 4"/>
                <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
            </svg>
            <span>COMMAND</span>
        </button>
        <button class="bottom-nav-item" data-tab="programs">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6.5 6.5h11M6.5 12h11M6.5 17.5h11"/>
                <rect x="2" y="3" width="20" height="18" rx="2"/>
            </svg>
            <span>WORKOUT</span>
        </button>
        <button class="bottom-nav-item" data-tab="nutrition">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8h1a4 4 0 010 8h-1"/>
                <path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/>
                <line x1="6" y1="1" x2="6" y2="4"/>
                <line x1="10" y1="1" x2="10" y2="4"/>
                <line x1="14" y1="1" x2="14" y2="4"/>
            </svg>
            <span>NUTRITION</span>
        </button>
    </nav>

    <script src="script.js"></script>
</body>

</html>
